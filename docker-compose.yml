services:
  hanime-web:
    build: .
    container_name: hanime-web
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=3280
      - ENGINE_URL=http://127.0.0.1:5001
      - ADMIN_PASSWORD=admin
      - SESSION_SECRET=change-me-in-production
    volumes:
      - ./downloads:/downloads
      - ./proxy-config.json:/app/proxy-config.json
