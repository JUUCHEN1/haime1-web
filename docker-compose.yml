services:
  hanime-web:
    build: .
    container_name: hanime-web
    ports:
      - "3280:3280"
    restart: unless-stopped
    environment:
      - PORT=3280
      - ENGINE_URL=http://127.0.0.1:5001
      - ADMIN_PASSWORD=admin
      - SESSION_SECRET=change-me-in-production
    volumes:
      - ./downloads:/downloads
      - ./data:/app/data
